- name: "AntiSplit M"
  url: "https://github.com/AbdurazaaqMohammed/AntiSplit-M"
  id: "com.abdurazaaqmohammed.AntiSplit"
  author: "AbdurazaaqMohammed"
  latestVersion: "2.3.1"
  installedVersion: "2.3.1"
  description: |
    App to AntiSplit (merge) split APKs (APKS/XAPK/APKM) to regular .APK file on Android
  readme: |
    # AntiSplit M
    
    Android app to merge/"AntiSplit" split APKs (APKS/XAPK/APKM) to a regular .APK file
    
    This project is a simple GUI implementation of Merge utilities from [REAndroid APKEditor](https://github.com/REAndroid/APKEditor).
    
    Some other apps that can perform this task like Apktool M, AntiSplit G2, NP Manager are all closed source. In addition, some older apps have a large problem in not removing the information about splits in the APK from the AndroidManifest.xml. If a merged/non-split APK contains this information it will cause an "App not installed" error on some devices. Fortunately the implementation by REAndroid fixes this issue.
    
    Version 2.x - Material You design, support Android 4.4+
    
    Version 1.x - Support Android 1.6+
    
    ## Usage
    
    Video - https://youtu.be/Vk566iMG6Gs
    
    There are 3 ways to open a split APK to be merged:
    
    - Share the file and select AntiSplit M in the share menu
    - Press (open) the file and select AntiSplit M in available options
    - Open the app from launcher and press the first button then select the split APK file.
    
    There is also a menu in the app that allows selecting an app from those installed on the device as a split APK. Please try this method if you have problems with selecting a downloaded split APK.
    
    Note: An APK must be signed in order to install it (unless you use tool like [Core Patch](https://github.com/LSPosed/CorePatch)). If you are planning to further modify the APK, you only need to sign it after the modifications (Apps like ReVanced Manager will sign it for you). Some apps verify the signature of the APK or take other measures to check if the app was modified, which may cause it to crash on startup.
    
    ## Screenshots
    
    | Main screen                                 | Settings                               | Selecting from installed apps                                 |
    | ------------------------------------------- | -------------------------------------- | ------------------------------------------------------------- |
    | ![Main screen](screenshot/2.2.7_home.jpeg) | ![Settings](screenshot/2.2.7_settings.jpeg) | ![Selecting from installed apps](screenshot/2.2.7_applist.jpeg) |
    
    | Dialog allowing splits selection   | Processing                                 | Result                             |
    | ---------------------------------- | ------------------------------------------ | ---------------------------------- |
    | ![Dialog](screenshot/2.2.7_splits_list.jpeg) | ![Processing](screenshot/2.2.7_processing.jpeg) | ![Result](screenshot/2.2.7_success.jpeg) |
    
    ## Used projects
    
    ⭐ [APKEditor](https://github.com/REAndroid/APKEditor) by REAndroid, what makes it all possible
    
    - [Android port](https://github.com/MuntashirAkon/apksig-android) of apksig library by MuntashirAkon to sign APKs
    
    ## Permissions
    
    - Storage permissions - to be able to save files to the same directory as a split APK (this is an option in the app, the storage permission will only be requested upon selecting it)
    - QUERY_ALL_PACKAGES - to list apps installed on the device (see "Selecting from installed apps" in screenshots above)
    - REQUEST_INSTALL_PACKAGES - to show an install button allowing prompt to install an app after merging it
    - Internet permission - to check update for the app (can be disabled in settings)
    
    Feel free to request a build of the app with any of these permissions removed.
    

- name: "NFile"
  url: "https://github.com/Senzme/NFile"
  id: "com.rubex.nfile"
  author: "Senzme"
  latestVersion: "v1.0.41"
  installedVersion: "v1.0.41"
  description: |
    A Beautiful File Manager
  readme: |
    # NFile
    
    A beautiful File Manager application built with Flutter.
    
    ## Overview
    NFile is designed to provide a highly aesthetic file management experience on Android. It features a stunning interface with an exclusive "Broken" icon pack, dynamic AMOLED-friendly dark mode, and a fluid user experience. 
    
    With the latest update, NFile transitions from a simple file explorer to a comprehensive media hub with built-in high-performance players and viewers.
    
    ## Features
    - **Premium UI/UX:** A textured and alpha-blended aesthetic that gives a modern, glassmorphic feel to your file browsing.
    - **Native Media Indexing:** Lightning-fast gallery views for Images, Videos, and Audio using native device indexing. No more slow recursive scans.
    - **Built-in Media Players:**
        - **High-Performance Video Player:** Powered by `media_kit` for smooth playback of high-resolution videos.
        - **Elegant Audio Player:** Clean playback interface with album art support and precise seeking.
        - **Pinch-to-Zoom Image Viewer:** View your memories in full detail with smooth gestures.
    - **Built-in Text Editor:** View and edit `.txt`, `.md`, `.json`, and other code files directly within the app.
    - **Advanced Sorting:** Filter your media by Newest, Oldest, or Date-wise to find what you need instantly.
    - **Complete File Operations:** Easily copy, cut, paste, rename, and delete files or folders.
    - **Quick Categories:** One-tap access to your indexed media libraries.
    - **Storage Overview:** Visual representation of your device's internal storage usage.
    - **Fluid UI:** iOS-style bouncy physics and smooth transitions throughout the app.
    
    ## Screenshots
    
    | | | | |
    |:---:|:---:|:---:|:---:|
    | <img src="https://github.com/user-attachments/assets/2d36cbea-e994-4302-b3a3-4b4364e96a41" width="200"> | <img src="https://github.com/user-attachments/assets/66b864ed-2598-477c-bdb4-d045a71e93b9" width="200"> | <img src="https://github.com/user-attachments/assets/874a9d0f-1796-4e4d-9f92-2c8915626376" width="200"> | <img src="https://github.com/user-attachments/assets/ca1e78e0-8e68-4985-bc9c-39e763b8ed74" width="200"> |
    
    
    ## Permissions
    The application requires the following permissions for full functionality:
    - `MANAGE_EXTERNAL_STORAGE`: For seamless file operations across the entire device.
    - `READ_MEDIA_IMAGES`, `READ_MEDIA_VIDEO`, `READ_MEDIA_AUDIO`: For high-speed native media indexing.
    
    ## Building and Running
    1. Clone this repository.
    2. Run `flutter pub get` to install dependencies.
    3. Run `flutter run` on an Android device (API 21+ required).
    
    ## Technologies Used
    - **Flutter & Dart**
    - **State Management:** `provider`
    - **Media Engine:** `media_kit` (Video & Audio playback)
    - **Indexing:** `photo_manager` & `on_audio_query`
    - **Permissions:** `permission_handler`
    - **Viewers:** `photo_view` & `open_filex`
    
    ## License
    GNU GPL v3 License
    

- name: "SwiftSlate"
  url: "https://github.com/Musheer360/SwiftSlate"
