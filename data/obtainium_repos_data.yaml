  readme: |
    # PixelPlayer 🎵
    
    <p align="center">
      <img src="assets/icon.png" alt="App Icon" width="128"/>
    </p>
    
    <p align="center">
      <strong>A beautiful, feature-rich music player for Android</strong><br>
      Built with Jetpack Compose and Material Design 3
    </p>
    
    <p align="center">
